<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active SOS Flow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Newsreader:opsz,wght@6..72,400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#003733",
                        "primary-fixed": "#cfeacc",
                        "on-tertiary-fixed-variant": "#5b4221",
                        "secondary": "#98d1ca",
                        "tertiary-fixed-dim": "#e5c095",
                        "surface": "#0f1512",
                        "primary": "#b7d1b4",
                        "on-error": "#690005",
                        "background": "#0f1512",
                        "surface-container-highest": "#303633",
                        "surface-container": "#1b211e",
                        "error": "#ffb4ab",
                        "inverse-primary": "#4d644d",
                        "outline": "#8d928a",
                        "inverse-surface": "#dee4df",
                        "on-secondary-container": "#8ac3bc",
                        "surface-container-high": "#252b28",
                        "on-primary": "#203522",
                        "surface-container-lowest": "#0a0f0d",
                        "surface-variant": "#303633",
                        "on-secondary-fixed-variant": "#114f4a",
                        "on-primary-fixed-variant": "#364c37",
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#2c322e",
                        "secondary-fixed": "#b4eee6",
                        "tertiary-fixed": "#ffddb6",
                        "on-tertiary-fixed": "#2a1800",
                        "on-tertiary": "#422c0d",
                        "secondary-fixed-dim": "#98d1ca",
                        "secondary-container": "#15524c",
                        "error-container": "#93000a",
                        "on-surface": "#dee4df",
                        "surface-tint": "#b4cdb1",
                        "on-tertiary-container": "#563d1d",
                        "on-primary-fixed": "#0b200e",
                        "on-primary-container": "#314732",
                        "surface-dim": "#0f1512",
                        "primary-fixed-dim": "#b4cdb1",
                        "primary-container": "#9cb59a",
                        "outline-variant": "#434842",
                        "on-secondary-fixed": "#00201d",
                        "surface-container-low": "#171d1a",
                        "on-surface-variant": "#c3c8bf",
                        "on-background": "#dee4df",
                        "tertiary": "#e9c498",
                        "surface-bright": "#343b37",
                        "tertiary-container": "#cba97f"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Newsreader", "serif"],
                        "display": ["Newsreader", "serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth transform for the breathing circle */
        .breathe-transition {
            transition: transform 4000ms cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface h-screen w-full flex flex-col items-center justify-between overflow-hidden antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Guidance Text -->
<header class="w-full flex justify-center pt-20 px-6 z-10">
<h1 class="font-headline text-3xl md:text-4xl text-on-surface tracking-wide opacity-90 transition-opacity duration-1000 text-center font-medium" id="instruction-text">
            Stay with your breath
        </h1>
</header>
<!-- Central Breathing UI -->
<main class="relative flex-1 w-full flex items-center justify-center -mt-10">
<!-- Progress Ring Container -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<svg class="w-80 h-80 md:w-96 md:h-96 transform -rotate-90" viewbox="0 0 100 100">
<!-- Track -->
<circle class="stroke-surface-container" cx="50" cy="50" fill="none" r="48" stroke-width="0.5"></circle>
<!-- Animated Progress Ring (Warm Amber) -->
<circle class="stroke-tertiary-container transition-all duration-1000 ease-linear" cx="50" cy="50" fill="none" id="progress-ring" r="48" stroke-dasharray="301.59" stroke-dashoffset="0" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
</div>
<!-- Breathing Circle -->
<div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-surface-container-highest flex items-center justify-center shadow-2xl shadow-surface-container-highest/20 breathe-transition transform scale-100" id="breathe-circle">
<span class="font-label text-sm md:text-base text-primary tracking-[0.2em] uppercase transition-opacity duration-700 opacity-100" id="breathe-text">
                Inhale
            </span>
</div>
</main>
<!-- Bottom Safety Action -->
<footer class="w-full max-w-sm px-6 pb-12 z-10"><div class="flex flex-col gap-4 mb-8 items-center"><button class="flex items-center gap-2 text-on-surface-variant/60 hover:text-on-surface-variant transition-colors text-sm font-label uppercase tracking-widest"><span class="material-symbols-outlined text-lg">volume_off</span><span>Quiet Audio</span></button><div class="flex items-center gap-2 text-primary/40 text-xs font-label uppercase tracking-[0.2em]"><span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span><span>Haptic Guidance Active</span></div></div><button class="w-full py-4 mb-4 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface-variant font-label text-sm tracking-wide transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 border border-surface-container-highest group"><span class="material-symbols-outlined text-lg opacity-70 group-hover:opacity-100 transition-opacity">pause</span>Pause</button>
<button class="w-full py-4 rounded-full bg-surface-container hover:bg-surface-container-high text-on-surface-variant font-label text-sm tracking-wide transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 border border-surface-container-highest group"><span class="material-symbols-outlined text-lg opacity-70 group-hover:opacity-100 transition-opacity">close</span>End Session</button>
</footer>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const totalDuration = 60; // 60 seconds total session
            const phaseDuration = 4000; // 4 seconds per inhale/exhale
            let timeLeft = totalDuration;
            let isBreathingIn = true;
            let animationInterval;
            let timerInterval;

            const progressRing = document.getElementById('progress-ring');
            const breatheCircle = document.getElementById('breathe-circle');
            const breatheText = document.getElementById('breathe-text');
            const instructionText = document.getElementById('instruction-text');

            // Circumference of the SVG circle (r=48 in a 100x100 viewBox)
            const radius = 48;
            const circumference = 2 * Math.PI * radius;
            
            // Initialize progress ring
            progressRing.style.strokeDasharray = circumference;
            progressRing.style.strokeDashoffset = 0;

            function triggerBreathPhase() {
                // Fade out text slightly before changing
                breatheText.style.opacity = '0';
                
                setTimeout(() => {
                    if (isBreathingIn) {
                        // Expand for Inhale
                        breatheCircle.style.transform = 'scale(1.6)';
                        breatheText.innerText = 'Inhale';
                    } else {
                        // Contract for Exhale
                        breatheCircle.style.transform = 'scale(1)';
                        breatheText.innerText = 'Exhale';
                    }
                    // Fade text back in
                    breatheText.style.opacity = '1';
                    
                    isBreathingIn = !isBreathingIn;
                }, 500); // Wait for fade out before changing text
            }

            function updateTimer() {
                timeLeft--;
                
                // Update Progress Ring
                const progressRatio = timeLeft / totalDuration;
                const offset = circumference - (progressRatio * circumference);
                progressRing.style.strokeDashoffset = offset;

                // End of Session
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    clearInterval(animationInterval);
                    
                    instructionText.innerText = 'Session Complete';
                    instructionText.classList.add('text-primary');
                    
                    breatheCircle.style.transform = 'scale(1)';
                    breatheText.style.opacity = '0';
                    
                    setTimeout(() => {
                        breatheText.innerText = 'Rest';
                        breatheText.style.opacity = '1';
                    }, 500);
                }
            }

            // Start the sequence with a slight delay for smooth entry
            setTimeout(() => {
                triggerBreathPhase(); // Initial phase trigger
                animationInterval = setInterval(triggerBreathPhase, phaseDuration);
                timerInterval = setInterval(updateTimer, 1000);
            }, 500);
        });
    </script>
</body></html>
