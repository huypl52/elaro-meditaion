<style>
        /* Custom breathing animations for steady rhythm */
        @keyframes breatheRing {
            0%, 100% { transform: scale(0.85); opacity: 0.15; }
            50% { transform: scale(1.15); opacity: 0.35; }
        }
        @keyframes breatheOrb {
            0%, 100% { transform: scale(0.9); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.6; }
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .animate-breathe-ring {
            animation: breatheRing 8s ease-in-out infinite;
        }
        .animate-breathe-orb {
            animation: breatheOrb 8s ease-in-out infinite;
        }
        .animate-pulse-text {
            animation: pulseText 8s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background flat no shadows">
<div class="flex items-center justify-between px-5 h-16 w-full">
<button class="text-on-surface-variant hover:text-on-surface transition-colors active:scale-95 duration-200 p-2 rounded-xl flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary-container/50">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Move session title here -->
<h1 class="font-headline text-headline-sm tracking-tight font-headline text-xl text-on-background font-medium">Deep Rest</h1>
<button class="text-on-surface-variant hover:text-on-surface transition-colors active:scale-95 duration-200 p-2 rounded-xl flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary-container/50">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Canvas (Session Player) -->
<main class="flex-1 flex flex-col items-center justify-start pt-24 pb-12 px-6 h-[884px] relative z-10">
<!-- Large Soft Timer -->
<div class="w-full flex justify-center mt-8 mb-12 opacity-40">
<div class="font-display text-[8rem] text-primary tracking-tighter drop-shadow-md tabular-nums font-light blur-[2px]">08:42</div>
</div>
<!-- Breathing Guidance -->
<div class="relative w-full flex flex-col items-center justify-center z-10 my-auto shrink-0 flex-1">
<!-- Breathing Visuals -->
<div class="absolute inset-0 rounded-full bg-primary-container animate-breathe-ring pointer-events-none blur-xl opacity-20"></div>
<div class="absolute w-64 h-64 rounded-full bg-primary-fixed-dim animate-breathe-orb blur-2xl pointer-events-none opacity-40"></div>
<!-- State (High Legibility) -->
<div class="relative z-20 flex flex-col items-center justify-center">
<div class="font-headline text-4xl text-on-background mb-2 tracking-tight">Resting with you</div>
<div class="font-label text-base text-secondary font-medium animate-pulse-text tracking-wide">Inhale gently</div>
</div>
</div>
<!-- Controls Area -->
<div class="w-full max-w-sm mt-auto z-20 flex flex-col gap-8 pb-4">
<!-- Primary Actions Row -->
<div class="flex items-center justify-center gap-6">
<!-- Silence Toggle Primary -->
<button class="w-16 h-16 rounded-2xl bg-surface-container-high border border-surface-variant text-on-surface hover:bg-surface-variant active:scale-95 transition-all duration-300 flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary-container/50 shadow-[0_0_15px_rgba(255,255,255,0.05)]">
<span class="material-symbols-outlined text-secondary text-[28px]">volume_off</span>
</button>
<!-- Play/Pause -->
<button class="w-20 h-20 rounded-[1.25rem] bg-primary flex items-center justify-center text-on-primary hover:bg-primary-fixed hover:scale-105 active:scale-95 transition-all duration-300 ease-out focus:outline-none focus:ring-4 focus:ring-primary-container/50 shadow-[0_0_20px_rgba(183,209,180,0.3)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 36px;">pause</span>
</button>
</div>
<!-- Safe Exit Action -->
<div class="flex justify-center mt-4">
<button class="flex items-center gap-2 px-6 py-3 rounded-xl text-error hover:bg-error-container/20 transition-colors active:scale-95 focus:outline-none">
<span class="font-label text-sm font-medium tracking-wide">End Session</span>
</button>
</div>
</div>
</main>
<!-- Subtle atmospheric background elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden mix-blend-screen opacity-10">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-container blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container blur-[100px] opacity-40"></div>
</div>
<!-- Script to sync animation timing lightly if needed, though pure CSS is preferred for performance here. -->
<script>
        // Placeholder for any state management logic
        document.addEventListener('DOMContentLoaded', () => {
            const pauseBtn = document.querySelector('button.bg-primary');
            const pauseIcon = pauseBtn.querySelector('span');
            let isPlaying = true;

            pauseBtn.addEventListener('click', () => {
                isPlaying = !isPlaying;
                // Switch icon
                pauseIcon.textContent = isPlaying ? 'pause' : 'play_arrow';
                // Pause animations
                const ring = document.querySelector('.animate-breathe-ring');
                const orb = document.querySelector('.animate-breathe-orb');
                const text = document.querySelector('.animate-pulse-text');
                const mainText = document.querySelector('.font-headline.text-4xl');
                
                if(!isPlaying) {
                    ring.style.animationPlayState = 'paused';
                    orb.style.animationPlayState = 'paused';
                    text.style.animationPlayState = 'paused';
                    text.textContent = 'Paused';
                    mainText.textContent = 'Quiet together';
                } else {
                    ring.style.animationPlayState = 'running';
                    orb.style.animationPlayState = 'running';
                    text.style.animationPlayState = 'running';
                    text.textContent = 'Inhale gently'; // Would normally sync with timer logic
                    mainText.textContent = 'Resting with you';
                }
            });
        });
    </script>
